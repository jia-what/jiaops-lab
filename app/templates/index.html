<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JiaOps 运维工单</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #fff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #e8f5f3 0%, var(--bg) 40%);
      color: var(--text);
    }
    main {
      max-width: 920px;
      margin: 32px auto;
      padding: 0 16px 48px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    label { display: block; font-size: 14px; margin: 12px 0 6px; }
    input, textarea, select, button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      margin-top: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.05); }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 14px;
    }
    th { color: var(--muted); font-weight: 600; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #ecfeff;
      color: #0e7490;
      font-size: 12px;
    }
    .row-form { display: flex; gap: 8px; align-items: center; }
    .row-form select { width: auto; min-width: 140px; }
    .row-form button { width: auto; margin-top: 0; padding: 8px 12px; }
    .empty { color: var(--muted); padding: 12px 0; }
  </style>
</head>
<body>
  <main>
    <h1>JiaOps 运维工单</h1>
    <p class="sub">最小可运行版本：创建 → 列表 → 改状态</p>

    <section class="card">
      <h2>新建工单</h2>
      <form method="post" action="/tickets">
        <label for="title">标题</label>
        <input id="title" name="title" required maxlength="200" placeholder="例如：Nginx 502" />

        <label for="description">描述</label>
        <textarea id="description" name="description" placeholder="现象、影响范围、初步排查..."></textarea>

        <label for="priority">优先级</label>
        <select id="priority" name="priority">
          {% for p in priorities %}
          <option value="{{ p }}" {% if p == 'medium' %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>

        <button type="submit">提交工单</button>
      </form>
    </section>

    <section class="card">
      <h2>工单列表</h2>
      {% if tickets %}
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>标题</th>
            <th>优先级</th>
            <th>状态</th>
            <th>更新状态</th>
          </tr>
        </thead>
        <tbody>
          {% for t in tickets %}
          <tr>
            <td>{{ t.id }}</td>
            <td>
              <strong>{{ t.title }}</strong><br />
              <span style="color:#6b7280">{{ t.description or '-' }}</span>
            </td>
            <td><span class="tag">{{ t.priority }}</span></td>
            <td>{{ t.status }}</td>
            <td>
              <form class="row-form" method="post" action="/tickets/{{ t.id }}/status">
                <select name="status">
                  {% for s in statuses %}
                  <option value="{{ s }}" {% if s == t.status %}selected{% endif %}>{{ s }}</option>
                  {% endfor %}
                </select>
                <button type="submit">更新</button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      {% else %}
      <p class="empty">暂无工单，先创建一条试试。</p>
      {% endif %}
    </section>
  </main>
</body>
</html>
