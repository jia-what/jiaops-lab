# Prometheus：抓自己 + Node Exporter + cAdvisor；加载基础告警规则

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警发到同 Compose 网络里的 Alertmanager（服务名 = 容器 DNS 名）
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # 宿主机指标（Compose 服务名 node-exporter）
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  # 容器指标（容器内端口 8080；宿主机映射是 8082）
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  # 工单应用（业务网 jiaops-net；容器名 jiaops-app）
  - job_name: jiaops-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - jiaops-app:5000
