# JiaOps Lab · Phase 3 Compose 栈
# 用法（在本目录）：
#   cp .env.example .env
#   docker compose up -d --build
# 并行验证（默认）：http://<IP>:8080/  （裸机仍占 :80）
# 可选 Redis：docker compose --profile with-redis up -d

name: jiaops

services:
  mysql:
    image: mysql:8.0
    container_name: jiaops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jiaops}
      MYSQL_USER: ${MYSQL_USER:-jiaops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../app/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - jiaops-net
    # 不映射 3306 → 宿主机，避免与裸机 mysqld 冲突

  app:
    build:
      context: ../../app
      dockerfile: Dockerfile
    image: jiaops-app:local
    container_name: jiaops-app
    restart: unless-stopped
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-jiaops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jiaops}
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - jiaops-net
    # 不直接暴露 5000，统一走 nginx

  nginx:
    image: nginx:1.25-alpine
    container_name: jiaops-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ../nginx/jiaops-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - jiaops-net

  # 可选：docker compose --profile with-redis up -d
  redis:
    image: redis:7-alpine
    container_name: jiaops-redis
    profiles: ["with-redis"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jiaops-net

volumes:
  mysql_data:
  redis_data:

networks:
  jiaops-net:
    name: jiaops-net
